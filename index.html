<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Skyplot & Footprint Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --border-color: #e5e7eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-bg: #eff6ff;
            --accent-border: #bfdbfe;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin: 0 0 8px 0;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (min-width: 900px) {
            .app-layout {
                grid-template-columns: 450px 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            height: fit-content;
        }

        .full-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            margin-top: 24px;
        }

        /* タイトルバーの整列用 */
        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 1.2rem;
            margin: 0;
            color: #475569;
        }

        /* 外部リンクボタンのスタイル */
        .ext-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: #f1f5f9;
            color: #475569;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .ext-link-btn:hover {
            background-color: var(--accent-bg);
            color: var(--primary-color);
            border-color: var(--accent-border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .paste-zone {
            background-color: var(--accent-bg);
            border: 1px dashed var(--accent-border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .paste-zone p {
            margin: 0 0 6px 0;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        /* Googleマップ用インラインリンク */
        .gmaps-link {
            color: #1e40af;
            text-decoration: underline;
            cursor: pointer;
        }
        .gmaps-link:hover {
            color: var(--primary-hover);
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #475569;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .slider-zone {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }

        .info-text {
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .plot-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background: #ffffff;
            max-width: 100%;
            height: auto;
        }

        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 12px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .visible { background-color: #d1fae5; color: var(--success-color); }
        .hidden { background-color: #fee2e2; color: var(--danger-color); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Satellite Skyplot & Footprint Tracker</h1>
    </header>

    <div class="app-layout">
        <div class="card">
            <div class="card-header-flex">
                <h2>1. 入力データ & 時間制御</h2>
                <a href="https://celestrak.org/NORAD/elements/index.php?FORMAT=tle" target="_blank" class="ext-link-btn" title="CelesTrakから最新のTLEを取得します">
                    📡 最新TLEを取得
                </a>
            </div>
            
            <div class="form-group">
                <label for="tleInput">TLE (2行軌道要素)</label>
                <textarea id="tleInput" rows="3">1 25544U 98067A   26162.89315532  .00014761  00000-0  26478-3 0  9990
2 25544  51.6416 189.2452 0001046  85.9228  46.4025 15.49472917571614</textarea>
            </div>

            <div class="paste-zone">
                <p>📍 <a href="https://maps.google.com" target="_blank" class="gmaps-link" title="Googleマップを開きます">Googleマップから座標をペースト</a>(地図上で右クリック)</p>
                <input type="text" id="gmapsPaste" placeholder="例: 35.153243, 137.043100">
            </div>

            <div class="grid-3">
                <div class="form-group">
                    <label for="latInput">緯度 (°)</label>
                    <input type="text" id="latInput" value="35.6895">
                </div>
                <div class="form-group">
                    <label for="lonInput">経度 (°)</label>
                    <input type="text" id="lonInput" value="139.6917">
                </div>
                <div class="form-group">
                    <label for="altInput">高度 (m)</label>
                    <input type="text" id="altInput" value="40">
                </div>
            </div>

            <button id="calcBtn">基準時刻を「現在」にリセット</button>

            <div class="slider-zone">
                <label for="timeSlider" style="display: flex; justify-content: space-between;">
                    <span>🕒 タイムシミュレーション</span>
                    <span id="sliderOffsetVal" style="color: var(--primary-color); font-weight: bold;">現在時刻</span>
                </label>
                <input type="range" id="timeSlider" min="-180" max="180" value="0" step="1">
                <div class="slider-labels">
                    <span>3時間前 (-180m)</span>
                    <span>現在 (0)</span>
                    <span>3時間後 (+180m)</span>
                </div>
            </div>
        </div>

        <div class="card plot-container">
            <div class="card-header-flex" style="width: 100%;">
                <h2>2. 天球配置図 (Skyplot)</h2>
            </div>
            <div class="info-text">
                <strong>計算日時 (JST):</strong> <span id="calcTime">-</span> | 
                <strong>AZ:</strong> <span id="txtAz">-</span> | 
                <strong>EL:</strong> <span id="txtEl">-</span>
            </div>
            <div id="statusBadge" class="status-badge" style="display: none;"></div>
            
            <canvas id="skyplotCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="full-card">
        <div class="card-header-flex">
            <h2>3. 衛星直下点と可視圏 (Footprint Map)</h2>
        </div>
        <div class="info-text">
            <strong>衛星位置:</strong> 緯度 <span id="satLat">-</span>°, 経度 <span id="satLon">-</span>° | 
            <strong>衛星高度:</strong> <span id="satAlt">-</span> km | 
            <strong>可視圏半径（地表距離）:</strong> 約 <span id="footprintRadius">-</span> km
        </div>
        <div class="map-container">
            <canvas id="mapCanvas" width="900" height="450"></canvas>
        </div>
    </div>
</div>

<script>
    let baseTime = new Date();


    // 🗺️ 高精細マルチポリゴン・ベクター世界地図データ
    // サイズ制限内でマレー半島・インドネシア・フィリピン・中米の形状をクリアに完全内蔵
    const worldContours = [
        // ユーラシア・ヨーロッパ・マレー半島（東南アジア島弧へ綺麗に接続）
        [[-9,39],[-9,43],[-5,43],[1,51],[-5,50],[-5,56],[-5,58],[-10,56],[5,58],[12,58],[15,56],[22,60],[19,65],[23,65],[32,71],[69,68],[74,72],[103,77],[169,69],[179,66],[171,60],[140,54],[135,48],[129,40],[124,40],[118,32],[121,25],[110,20],[108,14],[101,10],[103,1],[98,7],[96,16],[80,13],[72,8],[68,24],[62,25],[58,12],[47,15],[43,12],[48,27],[35,14],[32,30],[27,31],[34,35],[26,40],[22,40],[14,48],[12,43],[9,43],[9,40],[6,44],[0,46],[-5,43],[-9,39]],
        // アフリカ大陸
        [[-17,14],[-17,21],[-12,32],[-6,36],[5,36],[10,37],[13,38],[23,38],[32,31],[34,27],[31,10],[43,12],[51,11],[43,12],[33,-27],[19,-34],[12,-34],[5,-5],[-17,14]],
        // イギリス（ブリテン島）
        [[-5,50],[-6,52],[-5,55],[-3,58],[-2,57],[1,51],[-2,50],[-5,50]],
        // アイルランド
        [[-10,52],[-10,54],[-6,55],[-6,52],[-10,52]],
        // イタリア半島
        [[12,45],[12,43],[16,39],[18,40],[15,42],[13,45],[12,45]],
        // スカンジナビア半島
        [[10,54],[10,58],[5,58],[5,61],[11,64],[18,69],[28,70],[31,67],[34,65],[30,64],[22,60],[18,59],[18,55],[15,56],[10,54]],
        // マダガスカル
        [[49,-12],[50,-16],[47,-25],[44,-25],[46,-19],[43,-12],[49,-12]],
        // 日本（本州・四国・九州）
        [[130,32],[131,34],[133,34],[135,35],[139,35],[141,37],[142,41],[141,41],[139,38],[138,37],[136,35],[132,33],[130,32]],
        // 北海道
        [[140,41],[142,43],[145,44],[143,45],[141,45],[140,42],[140,41]],
        
        // 🆕 スマトラ島 (インドネシア)
        [[95,5],[98,2],[101,-1],[105,-5],[103,-4],[100,-1],[97,2],[95,5]],
        // 🆕 ボルネオ島 (インドネシア/マレーシア)
        [[109,1],[112,5],[115,7],[118,4],[119,1],[115,-3],[111,-3],[109,1]],
        // 🆕 ジャワ島 (インドネシア)
        [[105,-6],[110,-7],[114,-8],[114,-7],[109,-6],[105,-6]],
        // 🆕 スラウェシ島 (インドネシア)
        [[120,1],[121,1],[125,1],[124,-2],[120,-5],[119,-2],[120,1]],
        // 🆕 フィリピン諸島 (ルソン島・ミンダナオ島を集約表現)
        [[120,18],[122,16],[121,14],[125,13],[126,7],[122,7],[121,9],[120,14],[120,18]],

        // 🆕 北アメリカ大陸・中米諸国（メキシコからグアテマラ、パナマ地峡までを南米へ完全連結）
        [[-168,66],[-150,71],[-120,69],[-100,68],[-84,66],[-80,80],[-60,60],[-55,50],[-60,44],[-75,35],[-80,25],[-81,25],[-88,15],[-77,8],[-80,9],[-85,10],[-90,14],[-100,16],[-105,19],[-110,23],[-115,32],[-125,49],[-140,60],[-165,65],[-168,66]],
        // グリーンランド
        [[-50,60],[-60,75],[-40,83],[-20,75],[-30,65],[-50,60]],
        // 南アメリカ大陸（中米パナマ先端部と綺麗に座標合流）
        [[-77,8],[-72,11],[-60,3],[-50,-5],[-35,-6],[-41,-22],[-61,-37],[-66,-53],[-71,-54],[-75,-44],[-72,-37],[-72,-16],[-81,-5],[-77,8]],
        
        // オーストラリア大陸
        [[113,-22],[114,-35],[120,-34],[130,-31],[138,-35],[147,-38],[151,-34],[153,-28],[143,-10],[136,-12],[125,-15],[122,-18],[113,-22]],
        // タスマニア島
        [[145,-41],[148,-41],[147,-43],[145,-43],[145,-41]],
        // ニュージーランド（北島）
        [[173,-35],[175,-39],[178,-38],[175,-35],[173,-35]],
        // ニュージーランド（南島）
        [[167,-45],[174,-41],[171,-46],[167,-45]]
    ];
    
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(runCalculationAndPlot, 100);
    });

    function runCalculationAndPlot() {
        const rawTle = document.getElementById('tleInput').value.trim();
        if (!rawTle) return;

        const tleLines = rawTle.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
        if (tleLines.length < 2) return;
        
        const line2 = tleLines[tleLines.length - 1];
        const line1 = tleLines[tleLines.length - 2];

        let satName = "Satellite";
        if (tleLines.length >= 3) {
            satName = tleLines[tleLines.length - 3];
        } else {
            if(line1.includes("25544")) satName = "ISS";
        }

        const latDeg = parseFloat(document.getElementById('latInput').value);
        const lonDeg = parseFloat(document.getElementById('lonInput').value);
        const altMeters = parseFloat(document.getElementById('altInput').value);

        if (isNaN(latDeg) || isNaN(lonDeg)) return;

        const observerGd = {
            longitude: lonDeg * (Math.PI / 180),
            latitude: latDeg * (Math.PI / 180),
            height: isNaN(altMeters) ? 0 : altMeters / 1000
        };

        const offsetMinutes = parseInt(document.getElementById('timeSlider').value);
        const calcTime = new Date(baseTime.getTime() + offsetMinutes * 60 * 1000);

        const offsetLabel = document.getElementById('sliderOffsetVal');
        if (offsetMinutes === 0) {
            offsetLabel.textContent = "現在時刻";
        } else if (offsetMinutes > 0) {
            offsetLabel.textContent = `＋${offsetMinutes} 分後`;
        } else {
            offsetLabel.textContent = `－${Math.abs(offsetMinutes)} 分前`;
        }

        try {
            if (typeof satellite === 'undefined') return;

            const satrec = satellite.twoline2satrec(line1, line2);
            const positionAndVelocity = satellite.propagate(satrec, calcTime);
            const positionEci = positionAndVelocity.position;

            if (positionEci) {
                const gmst = satellite.gstime(calcTime);
                
                const positionEcf = satellite.eciToEcf(positionEci, gmst);
                const lookAngles = satellite.ecfToLookAngles(observerGd, positionEcf);
                const azimuthDeg   = lookAngles.azimuth * (180 / Math.PI);
                const elevationDeg = lookAngles.elevation * (180 / Math.PI);

                const positionGd = satellite.eciToGeodetic(positionEci, gmst);
                const satLatDeg = positionGd.latitude * (180 / Math.PI);
                const satLonDeg = positionGd.longitude * (180 / Math.PI);
                const satAltKm  = positionGd.height;

                document.getElementById('calcTime').textContent = calcTime.toLocaleString();
                document.getElementById('txtAz').textContent = `${azimuthDeg.toFixed(2)}°`;
                document.getElementById('txtEl').textContent = `${elevationDeg.toFixed(2)}°`;
                
                document.getElementById('satLat').textContent = satLatDeg.toFixed(4);
                document.getElementById('satLon').textContent = satLonDeg.toFixed(4);
                document.getElementById('satAlt').textContent = satAltKm.toFixed(0);

                const badge = document.getElementById('statusBadge');
                badge.style.display = 'inline-block';
                if (elevationDeg > 0) {
                    badge.textContent = '👉 この時刻、この場所から見えています！';
                    badge.className = 'status-badge visible';
                } else {
                    badge.textContent = '❌ この時刻、地平線の下に隠れています。';
                    badge.className = 'status-badge hidden';
                }

                drawSkyplot(azimuthDeg, elevationDeg, satName);
                drawFootprintMap(satLatDeg, satLonDeg, satAltKm, latDeg, lonDeg, satName);

            } else {
                clearCanvas();
            }
        } catch (error) {
            console.error(error);
        }
    }

    function clearCanvas() {
        ['skyplotCanvas', 'mapCanvas'].forEach(id => {
            const canvas = document.getElementById(id);
            if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        });
    }

    function drawSkyplot(azimuth, elevation, satName) {
        const canvas = document.getElementById('skyplotCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const maxRadius = Math.min(cx, cy) - 40;

        ctx.beginPath();
        ctx.arc(cx, cy, maxRadius, 0, 2 * Math.PI);
        ctx.fillStyle = '#f8fafc';
        ctx.fill();
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.stroke();

        const elCircles = [30, 60];
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        elCircles.forEach(el => {
            const r = maxRadius * ((90 - el) / 90);
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.stroke();
            ctx.fillStyle = '#64748b';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${el}°`, cx, cy - r - 4);
        });

        ctx.beginPath();
        ctx.moveTo(cx, cy - maxRadius); ctx.lineTo(cx, cy + maxRadius);
        ctx.moveTo(cx - maxRadius, cy); ctx.lineTo(cx + maxRadius, cy);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('N', cx, cy - maxRadius - 15);
        ctx.fillText('S', cx, cy + maxRadius + 15);
        ctx.fillText('E', cx + maxRadius + 15, cy);
        ctx.fillText('W', cx - maxRadius - 15, cy);

        ctx.font = '11px sans-serif';
        ctx.fillStyle = '#64748b';
        ctx.fillText('00', cx, cy - maxRadius - 32);
        ctx.fillText('18', cx, cy + maxRadius + 32);
        ctx.fillText('90', cx + maxRadius + 34, cy);
        ctx.fillText('27', cx - maxRadius - 36, cy);

        const angleRad = (azimuth - 90) * (Math.PI / 180);
        const clampedElevation = Math.max(-10, elevation);
        const r = maxRadius * ((90 - clampedElevation) / 90);

        const satX = cx + r * Math.cos(angleRad);
        const satY = cy + r * Math.sin(angleRad);

        ctx.beginPath();
        ctx.arc(satX, satY, 8, 0, 2 * Math.PI);
        ctx.fillStyle = '#f97316';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#f97316';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(` ${satName}`, satX + 10, satY);
    }

    function drawFootprintMap(satLat, satLon, satAlt, obsLat, obsLon, satName) {
        const canvas = document.getElementById('mapCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#e0f2fe';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const getXY = (lat, lon) => {
            const x = ((lon + 180) / 360) * canvas.width;
            const y = ((90 - lat) / 180) * canvas.height;
            return { x, y };
        };

        ctx.fillStyle = '#cbd5e1';
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1;
        
        worldContours.forEach(polygon => {
            ctx.beginPath();
            polygon.forEach((pt, idx) => {
                const xy = getXY(pt[1], pt[0]);
                if (idx === 0) ctx.moveTo(xy.x, xy.y);
                else ctx.lineTo(xy.x, xy.y);
            });
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        });

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 0.5;
        for (let l = -150; l <= 150; l += 30) {
            ctx.beginPath(); ctx.moveTo(getXY(90, l).x, 0); ctx.lineTo(getXY(-90, l).x, canvas.height); ctx.stroke();
        }
        for (let l = -60; l <= 60; l += 30) {
            ctx.beginPath(); ctx.moveTo(0, getXY(l, 0).y); ctx.lineTo(canvas.width, getXY(l, 0).y); ctx.stroke();
        }

        const obsXY = getXY(obsLat, obsLon);
        ctx.beginPath();
        ctx.arc(obsXY.x, obsXY.y, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#2563eb';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        ctx.fillStyle = '#2563eb';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('観測点', obsXY.x, obsXY.y - 10);

        const R_earth = 6371.0;
        const cosTheta = R_earth / (R_earth + satAlt);
        const clampedCos = Math.min(1.0, Math.max(-1.0, cosTheta));
        const centralAngleRad = Math.acos(clampedCos);
        const radiusEarthKm = R_earth * centralAngleRad;
        document.getElementById('footprintRadius').textContent = radiusEarthKm.toFixed(0);

        const degRadiusLon = (radiusEarthKm / (2 * Math.PI * R_earth * Math.cos(Math.max(-80, Math.min(80, satLat)) * Math.PI / 180))) * 360;
        const degRadiusLat = (radiusEarthKm / (2 * Math.PI * R_earth)) * 360;
        
        const pixelRadiusX = (degRadiusLon / 360) * canvas.width;
        const pixelRadiusY = (degRadiusLat / 180) * canvas.height;

        const satXY = getXY(satLat, satLon);

        ctx.save();
        ctx.beginPath();
        ctx.ellipse(satXY.x, satXY.y, Math.min(canvas.width/3, pixelRadiusX), Math.min(canvas.height/3, pixelRadiusY), 0, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(249, 115, 22, 0.18)'; 
        ctx.fill();
        ctx.strokeStyle = 'rgba(249, 115, 22, 0.7)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.restore();

        ctx.beginPath();
        ctx.arc(satXY.x, satXY.y, 6, 0, 2 * Math.PI);
        ctx.fillStyle = '#f97316';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = '#f97316';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(` ${satName}`, satXY.x + 8, satXY.y + 4);
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
        baseTime = new Date();
        document.getElementById('timeSlider').value = 0;
        runCalculationAndPlot();
    });

    document.getElementById('timeSlider').addEventListener('input', runCalculationAndPlot);

    document.getElementById('gmapsPaste').addEventListener('input', (e) => {
        const rawValue = e.target.value.trim();
        if (!rawValue) return;
        const parts = rawValue.split(',');
        if (parts.length >= 2) {
            document.getElementById('latInput').value = parts[0].trim();
            document.getElementById('lonInput').value = parts[1].trim();
            document.getElementById('timeSlider').value = 0;
            runCalculationAndPlot();
        }
    });
</script>

</body>
</html>
